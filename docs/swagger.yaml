basePath: /
definitions:
  comment.CommentResponse:
    properties:
      authorAvatarUrl:
        type: string
      authorEmail:
        type: string
      authorName:
        type: string
      content:
        type: string
      createdAt:
        type: string
      depth:
        type: integer
      id:
        type: string
      postSeq:
        type: integer
      replies:
        items:
          $ref: '#/definitions/comment.CommentResponse'
        type: array
    type: object
  comment.CreateCommentRequest:
    properties:
      content:
        type: string
      postSeq:
        type: integer
    type: object
  comment.CreateReplyRequest:
    properties:
      content:
        type: string
    type: object
  comment.UpdateCommentRequest:
    properties:
      content:
        type: string
    type: object
  photocomment.CreatePhotoCommentRequest:
    properties:
      content:
        type: string
      photoSeq:
        type: integer
    type: object
  photocomment.PhotoCommentResponse:
    properties:
      authorAvatarUrl:
        type: string
      authorEmail:
        type: string
      authorName:
        type: string
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      photoSeq:
        type: integer
    type: object
  photocomment.UpdatePhotoCommentRequest:
    properties:
      content:
        type: string
    type: object
  response.Response:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8081
info:
  contact: {}
  description: 댓글 및 사진 댓글 CRUD REST API. 인증은 쿠키 기반 세션으로 처리됩니다.
  title: Comment API
  version: "1.0"
paths:
  /api/comments:
    get:
      description: postSeq에 해당하는 댓글을 트리 구조로 반환합니다.
      parameters:
      - description: 게시물 ID
        format: int64
        in: query
        name: postSeq
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/comment.CommentResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: 게시물 댓글 목록 조회
      tags:
      - comments
    post:
      consumes:
      - application/json
      description: 게시물에 새 댓글을 작성합니다. COMMENT_SESSION 쿠키가 필요합니다.
      parameters:
      - description: 댓글 작성 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/comment.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      summary: 댓글 작성
      tags:
      - comments
  /api/comments/{commentId}:
    delete:
      description: 댓글을 소프트 삭제합니다. 작성자(CommentSession) 또는 관리자(LifelogSession)만 삭제 가능합니다.
      parameters:
      - description: 댓글 ID (ObjectID hex)
        in: path
        name: commentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      - LifelogSession: []
      summary: 댓글 삭제
      tags:
      - comments
    put:
      consumes:
      - application/json
      description: 댓글 내용을 수정합니다. 작성자(CommentSession) 또는 관리자(LifelogSession)만 수정 가능합니다.
      parameters:
      - description: 댓글 ID (ObjectID hex)
        in: path
        name: commentId
        required: true
        type: string
      - description: 댓글 수정 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/comment.UpdateCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      - LifelogSession: []
      summary: 댓글 수정
      tags:
      - comments
  /api/comments/{commentId}/replies:
    post:
      consumes:
      - application/json
      description: 특정 댓글에 답글을 작성합니다. 최대 depth=2까지 허용됩니다. COMMENT_SESSION 쿠키가 필요합니다.
      parameters:
      - description: 부모 댓글 ID (ObjectID hex)
        in: path
        name: commentId
        required: true
        type: string
      - description: 답글 작성 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/comment.CreateReplyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      summary: 답글 작성
      tags:
      - comments
  /api/comments/user/session/heartbeat:
    post:
      description: COMMENT_SESSION 쿠키의 TTL을 갱신합니다.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      summary: 세션 유지 (하트비트)
      tags:
      - comments
  /api/photo-comments:
    get:
      description: photoSeq에 해당하는 사진 댓글 목록을 반환합니다.
      parameters:
      - description: 사진 ID
        format: int64
        in: query
        name: photoSeq
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/photocomment.PhotoCommentResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: 사진 댓글 목록 조회
      tags:
      - photo-comments
    post:
      consumes:
      - application/json
      description: 사진에 새 댓글을 작성합니다. COMMENT_SESSION 쿠키가 필요합니다.
      parameters:
      - description: 사진 댓글 작성 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/photocomment.CreatePhotoCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      summary: 사진 댓글 작성
      tags:
      - photo-comments
  /api/photo-comments/{commentId}:
    delete:
      description: 사진 댓글을 소프트 삭제합니다. 작성자(CommentSession) 또는 관리자(LifelogSession)만 삭제
        가능합니다.
      parameters:
      - description: 댓글 ID (ObjectID hex)
        in: path
        name: commentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      - LifelogSession: []
      summary: 사진 댓글 삭제
      tags:
      - photo-comments
    put:
      consumes:
      - application/json
      description: 사진 댓글 내용을 수정합니다. 작성자(CommentSession) 또는 관리자(LifelogSession)만 수정
        가능합니다.
      parameters:
      - description: 댓글 ID (ObjectID hex)
        in: path
        name: commentId
        required: true
        type: string
      - description: 사진 댓글 수정 요청
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/photocomment.UpdatePhotoCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      - LifelogSession: []
      summary: 사진 댓글 수정
      tags:
      - photo-comments
  /auth/github:
    get:
      description: GitHub OAuth 인증 페이지로 리다이렉트합니다. OAUTH_STATE 쿠키가 발급됩니다.
      responses:
        "302":
          description: Found
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: GitHub OAuth 로그인 시작
      tags:
      - auth
  /auth/github/callback:
    get:
      description: GitHub에서 받은 code와 state로 토큰 교환 후 COMMENT_SESSION 쿠키를 발급합니다. AUTH_SUCCESS_URL
        설정 시 해당 URL로 리다이렉트합니다.
      parameters:
      - description: GitHub OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state 값
        in: query
        name: state
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "302":
          description: Found
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: GitHub OAuth 콜백 처리
      tags:
      - auth
  /auth/logout:
    post:
      description: COMMENT_SESSION 쿠키를 만료시키고 Redis에서 세션을 삭제합니다. 관리자 세션(LIFELOG_SESSION)은
        대상이 아닙니다.
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - CommentSession: []
      summary: 로그아웃
      tags:
      - auth
securityDefinitions:
  CommentSession:
    description: GitHub SSO로 발급된 일반 사용자 세션 쿠키
    in: cookie
    name: COMMENT_SESSION
    type: apiKey
  LifelogSession:
    description: lifelog(Java)에서 발급된 관리자 세션 쿠키 (읽기 전용)
    in: cookie
    name: LIFELOG_SESSION
    type: apiKey
swagger: "2.0"
